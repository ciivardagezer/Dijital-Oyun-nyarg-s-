<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Blog yazısı detay sayfası." />
  <!-- Sayfa başlığı main.js tarafından dinamik olarak güncellenir -->
  <title>Yazı — Akademi Blog</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&display=swap"
    rel="stylesheet"
  />

  <!-- Ana Stil Dosyası -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<!--
  data-page="post" → main.js bu bilgiyle
  blog detay sayfası kodunu çalıştırır.
-->
<body data-page="post">

  <!-- ═══════════════════════════════════════════
       HEADER
  ════════════════════════════════════════════ -->
  <header class="site-header">
    <div class="container header-inner">

      <a href="index.html" class="site-logo">Akademi Blog</a>

      <button
        class="menu-toggle"
        id="menuToggle"
        aria-label="Menüyü aç/kapat"
        aria-expanded="false"
        aria-controls="navLinks"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav id="navLinks" class="nav-links" role="navigation" aria-label="Ana menü">
        <a href="index.html">Ana Sayfa</a>
        <a href="about.html">Hakkında</a>
      </nav>

    </div>
  </header>


  <main>

    <!-- ═══════════════════════════════════════════
         BLOG DETAY — main.js bu alana yazıyı yerleştirir
    ════════════════════════════════════════════ -->
    <div class="post-page">
      <div class="container">

        <!--
          main.js, URL'deki ?id=... parametresini okuyarak
          posts.js'deki ilgili yazıyı buraya render eder.
        -->
        <div id="postDetail"></div>

      </div>
    </div>

  </main>


  <!-- ═══════════════════════════════════════════
       FOOTER
  ════════════════════════════════════════════ -->
  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">

      <div>
        <p class="footer-brand">Akademi Blog</p>
        <p class="footer-desc">Üniversite grup projesi — bilgi, kültür ve araştırma üzerine.</p>
      </div>

      <p class="footer-copy">© 2025 Akademi Blog. Tüm hakları saklıdır.</p>

    </div>
  </footer>


  <!-- ═══════════════════════════════════════════
       JAVASCRIPT DOSYALARI
  ════════════════════════════════════════════ -->
  <script src="js/posts.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
